services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
    networks:
      - red-bootcamp

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_USERNAME=postgres
      - SONAR_JDBC_PASSWORD=12345
      - SONAR_JDBC_URL=jdbc:postgresql://postgres-dev:5432/sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - red-bootcamp

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka_broker
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 'r4zt_wrqTRuT7W2NJsB_GA'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_broker:9093'
      KAFKA_LISTENERS: 'EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://127.0.0.1:9092,INTERNAL://kafka_broker:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_BYTES: 130023424 # 124MB
      KAFKA_LOG_RETENTION_MS: 432000000 # 5 días
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - 9092:9092
    networks:
      - red-bootcamp

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: schema-registry
    restart: always
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # Importante: usar el listener interno de Kafka
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka_broker:9094
    networks:
      - red-bootcamp

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    restart: always
    ports:
      - "8082:8080"
    environment:
      AUTH_TYPE: "DISABLED"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_broker:9094
      KAFKA_CLUSTERS_0_NAME: Tracking_Cluster
    networks:
      - red-bootcamp

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - red-bootcamp

  dispatch-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dispatch-consumer
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - schema-registry
      - mongodb
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MONGO_URI: mongodb://mongodb:27017/cardsdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8086
    networks:
      - red-bootcamp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8086/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongo-data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  kafka_data:
    driver: local
  redis_data:
    driver: local

networks:
  red-bootcamp:
    driver: bridge